<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Webhook</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="background:#1a1a2e;color:#fff;padding:20px;font-family:sans-serif;">
    <h2>🔧 Тест Webhook</h2>
    <div id="status">Загрузка...</div>
    <pre id="result" style="background:rgba(0,0,0,0.3);padding:15px;border-radius:8px;overflow:auto;"></pre>
    <button onclick="testWebhook()" style="padding:15px 30px;font-size:16px;margin-top:20px;cursor:pointer;">🔄 Повторить запрос</button>

<script>
    const WEBHOOK_URL = 'https://telebothost.com/webhook/1397571/syncGameData';
    
    async function testWebhook() {
        const tg = window.Telegram.WebApp;
        tg.ready();
        
        const initData = tg.initDataUnsafe;
        const uid = initData.user ? initData.user.id : 0;
        
        document.getElementById('status').innerHTML = 
            '<b>UID:</b> ' + uid + '<br>' +
            '<b>URL:</b> ' + WEBHOOK_URL + '<br><br>' +
            '<b>Отправка запроса...</b>';
        
        try {
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    uid: uid,
                    action: 'get_data'
                })
            });
            
            const text = await response.text();
            let data;
            try {
                data = JSON.parse(text);
            } catch(e) {
                data = { error: 'Not JSON', raw: text };
            }
            
            document.getElementById('status').innerHTML = 
                '<b>Статус HTTP:</b> ' + response.status + '<br>' +
                '<b>Ответ:</b>';
            document.getElementById('result').textContent = JSON.stringify(data, null, 2);
            
        } catch(e) {
            document.getElementById('status').innerHTML = '<b style="color:#ef4444;">ОШИБКА:</b> ' + e.message;
            document.getElementById('result').textContent = '';
        }
    }
    
    testWebhook();
</script>
</body>
</html>
